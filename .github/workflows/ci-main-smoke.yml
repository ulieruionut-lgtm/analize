# Verificare rapidă la fiecare push pe main — prinde lipsă de module înainte de deploy.
# Deploy-ul efectiv pe Railway: conectează repo-ul în Railway (GitHub) → la push pe main se rebuild-uiește automat.
name: CI main (smoke import)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Pip
        run: pip install -r requirements.txt

      - name: Import aplicație + parser + lab_detect
        run: |
          python - <<'PY'
          from backend import main
          from backend.parser import extract_rezultate
          from backend.lab_detect import resolve_laborator_id_for_text
          assert main._PARSER_VERSION
          assert callable(extract_rezultate)
          assert callable(resolve_laborator_id_for_text)
          print("OK", main._PARSER_VERSION)
          PY
